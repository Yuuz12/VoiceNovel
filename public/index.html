<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>语音小说 · VoiceNovel</title>
  <link rel="stylesheet" href="/styles/main.css" />
  <link rel="stylesheet" href="/styles/player.css" />
  <link rel="stylesheet" href="/styles/config.css" />
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="logo">🎙️</span>
      <h1>语音小说</h1>
    </div>
    <nav class="tabs">
      <button class="tab active" data-view="library">📚 小说库</button>
      <button class="tab" data-view="settings">⚙️ 设置</button>
    </nav>
    <div class="header-status" id="header-status">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-text">未连接</span>
    </div>
  </header>

  <main class="app-main">
    <!-- ============ 小说库视图 ============ -->
    <section id="view-library" class="view active">
      <aside class="sidebar">
        <div class="sidebar-head">
          <h2>小说列表</h2>
          <button class="btn btn-primary btn-sm" id="btn-new-novel">+ 新建</button>
        </div>
        <ul class="novel-list" id="novel-list">
          <li class="empty-hint">暂无小说，点击"新建"上传</li>
        </ul>
      </aside>

      <section class="content-area" id="novel-content">
        <div class="empty-state">
          <div class="empty-icon">📖</div>
          <p>选择一本小说，或新建一本开始聆听</p>
        </div>
      </section>

      <aside class="character-panel" id="character-panel">
        <div class="panel-head">
          <h2>角色音色</h2>
        </div>
        <div class="panel-body" id="character-list">
          <p class="empty-hint">打开小说后，角色列表在此显示</p>
        </div>
      </aside>
    </section>

    <!-- ============ 设置视图 ============ -->
    <section id="view-settings" class="view">
      <div class="settings-wrap">
        <h2>全局设置</h2>

        <fieldset class="settings-section">
          <legend>🔊 方舟 TTS 配置</legend>
          <div class="form-row">
            <label>API Key</label>
            <input type="password" id="set-tts-apikey" placeholder="方舟 Agent Plan 专属 API Key" autocomplete="off" />
          </div>
          <div class="form-row">
            <label>Resource ID</label>
            <input type="text" id="set-tts-resource" placeholder="seed-tts-2.0" />
          </div>
          <div class="form-row">
            <label>Base URL（请填 Agent Plan 专属地址，避免额外费用）</label>
            <input type="text" id="set-tts-baseurl" placeholder="https://openspeech.bytedance.com/api/v3/plan/tts/unidirectional" />
          </div>
          <div class="form-row">
            <label>音频格式</label>
            <select id="set-tts-format">
              <option value="mp3">mp3</option>
              <option value="wav">wav</option>
              <option value="pcm">pcm</option>
            </select>
          </div>
          <div class="form-row">
            <label>采样率</label>
            <select id="set-tts-samplerate">
              <option value="24000">24000</option>
              <option value="16000">16000</option>
              <option value="8000">8000</option>
            </select>
          </div>
          <div class="form-actions">
            <button class="btn btn-secondary" id="btn-test-tts">测试连接</button>
            <span id="tts-test-result" class="result-hint"></span>
          </div>
        </fieldset>

        <fieldset class="settings-section">
          <legend>🤖 LLM 配置（OpenAI 兼容，用于角色提取 / 智能分段 / 音色推荐）</legend>
          <div class="form-row">
            <label>Base URL</label>
            <input type="text" id="set-llm-baseurl" placeholder="https://api.openai.com/v1" />
          </div>
          <div class="form-row">
            <label>API Key</label>
            <input type="password" id="set-llm-apikey" placeholder="sk-..." autocomplete="off" />
          </div>
          <div class="form-row">
            <label>Model</label>
            <input type="text" id="set-llm-model" placeholder="gpt-4o-mini" />
          </div>
        </fieldset>

        <fieldset class="settings-section">
          <legend>📖 旁白音色</legend>
          <div class="form-row">
            <label>音色</label>
            <select id="set-narration-voice"></select>
          </div>
          <div class="form-row">
            <label>语速 <span class="value-tag" id="narration-speed-val">0</span></label>
            <input type="range" id="set-narration-speed" min="-50" max="100" value="0" />
          </div>
          <div class="form-row">
            <label>音量 <span class="value-tag" id="narration-volume-val">0</span></label>
            <input type="range" id="set-narration-volume" min="-50" max="100" value="0" />
          </div>
          <div class="form-actions">
            <button class="btn btn-secondary" id="btn-preview-narration">▶ 试听</button>
            <audio id="preview-narration-audio" hidden></audio>
          </div>
        </fieldset>

        <fieldset class="settings-section">
          <legend>✂️ 分段与解析</legend>
          <div class="form-row">
            <label>对话符号对</label>
            <div id="dialog-symbols-list" class="symbol-list"></div>
            <button class="btn btn-link" id="btn-add-symbol">+ 添加符号对</button>
          </div>
          <div class="form-row">
            <label>最大段长（字符）</label>
            <input type="number" id="set-max-seg-len" min="50" max="500" value="200" />
          </div>
          <div class="form-row">
            <label>LLM 分块字数（长文按此字数切块逐段处理，避免超时）</label>
            <input type="number" id="set-llm-chunk-size" min="500" max="20000" step="100" value="2000" />
          </div>
          <div class="form-row checkbox-row">
            <input type="checkbox" id="set-auto-seg" />
            <label for="set-auto-seg">上传小说时自动分段</label>
          </div>
        </fieldset>

        <fieldset class="settings-section">
          <legend>▶️ 播放</legend>
          <div class="form-row">
            <label>段落间隔（毫秒）</label>
            <input type="number" id="set-gap-ms" min="0" max="3000" step="100" value="300" />
          </div>
        </fieldset>

        <fieldset class="settings-section">
          <legend>💾 音频缓存</legend>
          <div class="form-row">
            <label>当前缓存大小</label>
            <span id="cache-size-text">-</span>
          </div>
          <div class="form-actions">
            <button class="btn btn-secondary" id="btn-refresh-cache">刷新</button>
            <button class="btn btn-danger" id="btn-clear-cache">清空缓存</button>
          </div>
        </fieldset>

        <div class="form-actions sticky-save">
          <button class="btn btn-primary" id="btn-save-settings">💾 保存设置</button>
          <span id="settings-save-result" class="result-hint"></span>
        </div>
      </div>
    </section>
  </main>

  <!-- 新建小说对话框 -->
  <div class="modal hidden" id="modal-new-novel">
    <div class="modal-card">
      <div class="modal-head">
        <h3>新建小说</h3>
        <button class="btn btn-icon" data-close-modal>✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <label>标题</label>
          <input type="text" id="new-novel-title" placeholder="例如：三体 - 第一章" />
        </div>
        <div class="form-row">
          <label>正文</label>
          <textarea id="new-novel-text" rows="14" placeholder="粘贴小说文本，或拖入 .txt 文件..."></textarea>
        </div>
        <div class="form-row checkbox-row">
          <input type="checkbox" id="new-novel-autoseg" checked />
          <label for="new-novel-autoseg">上传时自动分段</label>
        </div>
        <div class="form-row">
          <label>或上传 .txt 文件</label>
          <input type="file" id="new-novel-file" accept=".txt,.text,.md" />
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn btn-secondary" data-close-modal>取消</button>
        <button class="btn btn-primary" id="btn-create-novel">创建</button>
      </div>
    </div>
  </div>

  <script src="/scripts/utils.js"></script>
  <script src="/scripts/api.js"></script>
  <script src="/scripts/progressModal.js"></script>
  <script src="/scripts/player.js"></script>
  <script src="/scripts/novelManager.js"></script>
  <script src="/scripts/characterPanel.js"></script>
  <script src="/scripts/settingsPanel.js"></script>
  <script src="/scripts/app.js"></script>
</body>
</html>
